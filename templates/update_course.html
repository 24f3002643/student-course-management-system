<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Course</title>
</head>
<body>
    <h2>Update Course</h2>

    <form action="/course/{{ courses.course_id}}/update" method="POST" id="update-course-form">
        <div>
            <label>Course Code :</label>
            <input type="text" name="code" value="{{ courses.course_code }}" disabled />
        </div>

        <div>
            <label>Course Name</label>
            <input type="text" name="c_name" value="{{ courses.course_name }}" required />
        </div>

        <div>
            <label>Course Description</label>
            <input type="text" name="desc" value="{{ courses.course_description }}" />
        </div>

        <div>
            <input type="submit" value="Submit">
        </div>
    </form>
    
</body>
</html>
